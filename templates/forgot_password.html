{% extends 'base.html' %}
{% block bg_class %}bg-welcome{% endblock %}
{% block content %}
<div class="glass-panel form-panel" style="max-width: 450px; margin: 5rem auto;">
    <h2 style="text-align: center; border-bottom: 2px solid var(--neon-purple); padding-bottom: 1rem;">RESET_PASSWORD</h2>
    <p style="color: var(--neon-cyan); font-size: 0.9rem; margin-bottom: 2rem; text-align: center;">ENTER REGISTERED PHONE TO SET NEW PASSWORD</p>
    {% if error %}<div style="color: var(--neon-pink); background: rgba(255,0,0,0.1); padding: 1rem; border-left: 2px solid var(--neon-pink); margin-bottom: 2rem;">{{ error }}</div>{% endif %}
    <form method="post" class="cyber-form">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;"><label style="display: block; margin-bottom: 0.5rem;">PHONE_NUMBER:</label><input type="text" name="phone_number" required style="width: 100%;"></div>
        <div style="margin-bottom: 1.5rem;"><label style="display: block; margin-bottom: 0.5rem;">NEW_PASSWORD:</label><input type="password" name="new_password" required style="width: 100%;"></div>
        <div style="margin-bottom: 2rem;"><label style="display: block; margin-bottom: 0.5rem;">CONFIRM_NEW_PASSWORD:</label><input type="password" name="confirm_password" required style="width: 100%;"></div>
        <button type="submit" class="btn-neon glossy-animation" style="width: 100%;">SAVE_NEW_CREDENTIALS</button>
    </form>
    <div style="margin-top: 1.5rem; text-align: center;"><a href="{% url 'auth_page' %}" style="color: var(--neon-cyan); text-decoration: none; font-size: 0.9rem;">BACK BACK_TO_LOGIN</a></div>
</div>
{% endblock %}
