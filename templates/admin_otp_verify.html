{% extends 'base.html' %}
{% block bg_class %}bg-admin-portal{% endblock %}
{% block content %}
<div class="container" style="display: flex; min-height: 80vh; align-items: center; justify-content: center;">
    <div class="glass-panel admin-card" style="width: 100%; max-width: 450px; text-align: center; position: relative;">
        <h2 style="font-family: 'Bangers'; color: var(--magenta); font-size: 2.5rem; margin-bottom: 0.5rem; text-shadow: 0 0 10px var(--magenta);">SECURITY_VERIFICATION</h2>
        <p style="font-family: 'Orbitron'; color: var(--vibrant-cyan); font-weight: bold; margin-bottom: 2rem; font-size: 0.8rem; letter-spacing: 2px;">MANAGER IDENTIFIED: {{ phone }}</p>
        
        {% if error %}
        <div style="background: rgba(255,0,0,0.2); border: 1px solid var(--magenta); color: #ff99aa; padding: 0.8rem; margin-bottom: 2rem; font-family: 'Orbitron'; font-size: 0.9rem;">
            ERR: {{ error }}
        </div>
        {% endif %}

        <form method="post" id="admin_verify">
            {% csrf_token %}
            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label style="color: #fff; font-family: 'Bangers'; font-size: 1.1rem; display: block; margin-bottom: 0.5rem;">ONE_TIME_PIN (OTP)</label>
                <input type="text" name="otp" required maxlength="6" style="width: 100%; padding: 1rem; background: rgba(0,0,0,0.5); border: 2px solid var(--vibrant-cyan); color: #fff; font-family: 'Orbitron'; font-size: 1.5rem; letter-spacing: 5px; text-align: center; outline: none;">
            </div>
            
            <div style="margin-bottom: 2.5rem; text-align: left;">
                <label style="color: #fff; font-family: 'Bangers'; font-size: 1.1rem; display: block; margin-bottom: 0.5rem;">MASTER_PASSWORD</label>
                <input type="password" name="password" required style="width: 100%; padding: 1rem; background: rgba(0,0,0,0.5); border: 2px solid var(--vibrant-cyan); color: #fff; font-family: 'Orbitron'; font-size: 1.2rem; outline: none;">
            </div>
            
            <button type="submit" class="btn-neon" style="width: 100%; font-size: 1.5rem; padding: 1.2rem; background: var(--magenta); border: none; color: #fff; text-shadow: 1px 1px 0 #000;">AUTHORIZE_ACCESS</button>
        </form>
    </div>
</div>
{% endblock %}
