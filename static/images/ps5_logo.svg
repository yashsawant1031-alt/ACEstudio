<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 500 280' width='500' height='280'>
  <defs>
    <filter id='glow'>
      <feGaussianBlur stdDeviation='4' result='coloredBlur'/>
      <feMerge><feMergeNode in='coloredBlur'/><feMergeNode in='SourceGraphic'/></feMerge>
    </filter>
    <linearGradient id='psGrad' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#ffffff;stop-opacity:1'/>
      <stop offset='100%' style='stop-color:#a0ffa0;stop-opacity:1'/>
    </linearGradient>
  </defs>
  <!-- PS5 text with glow effect -->
  <text x='50%' y='55%' font-family='Arial Black, sans-serif' font-size='130' font-weight='900'
        fill='url(#psGrad)' text-anchor='middle' dominant-baseline='middle'
        filter='url(#glow)' letter-spacing='-5'>PS5</text>
  <!-- Decorative underline -->
  <rect x='80' y='210' width='340' height='4' rx='2' fill='#4CAF50' filter='url(#glow)' opacity='0.8'/>
  <!-- Small dots decoration -->
  <circle cx='60' cy='212' r='6' fill='#00ff88' filter='url(#glow)'/>
  <circle cx='440' cy='212' r='6' fill='#00ff88' filter='url(#glow)'/>
</svg>